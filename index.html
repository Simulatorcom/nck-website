<!DOCTYPE html>
<html lang="en" data-theme="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUS GAMES</title>
    
    <link rel="icon" type="image/png" href="https://cdn.phototourl.com/free/2026-07-21-a8a7d950-86b8-469b-b119-c9ce3dffa435.png">
    
    <meta property="og:title" content="PLUS GAMES">
    <meta property="og:description" content="The ultimate Roblox pet simulator experience combining the best mechanics of PSX+ (Plus), Pet Simulator 99, and exclusive custom features! Fueled by Nck & External.">
    <meta property="og:image" content="https://cdn.phototourl.com/free/2026-07-21-a8a7d950-86b8-469b-b119-c9ce3dffa435.png">
    <meta property="og:url" content="https://nck-website.pages.dev/">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#5865F2">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #5865F2;
            --accent-color: #00ffcc;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --header-bg: rgba(18, 18, 18, 0.9);
            --gradient-bg: radial-gradient(circle at 50% 20%, #2b2b2b 0%, var(--dark-bg) 70%);
            --border-color: rgba(255, 255, 255, 0.08);
            --transition-speed: 0.3s;
        }

        body.no-animations * {
            transition: none !important;
            animation: none !important;
        }

        [data-theme="light"] {
            --primary-color: #4350e6;
            --accent-color: #008f6b;
            --dark-bg: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --text-muted: #555555;
            --header-bg: rgba(255, 255, 255, 0.9);
            --gradient-bg: radial-gradient(circle at 50% 20%, #e4e6eb 0%, var(--dark-bg) 70%);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --primary-color: #7289da;
            --accent-color: #7289da;
            --dark-bg: #121212;
            --card-bg: #181818;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --header-bg: rgba(24, 24, 24, 0.9);
            --gradient-bg: var(--dark-bg);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        [data-theme="normal"] {
            --primary-color: #5865F2;
            --accent-color: #00ffcc;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --header-bg: rgba(18, 18, 18, 0.9);
            --gradient-bg: radial-gradient(circle at 50% 20%, #2b2b2b 0%, var(--dark-bg) 70%);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease, border-color var(--transition-speed) ease;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: var(--gradient-bg);
        }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            padding: 15px 30px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 55px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 6px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text-color), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .nav-center-group {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            list-style: none;
        }

        .nav-tab {
            padding: 8px 22px;
            cursor: pointer;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: var(--text-color);
            background: rgba(128, 128, 128, 0.08);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab i {
            width: 18px;
            height: 18px;
        }

        .nav-tab:hover, .nav-tab.active {
            background: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.5);
        }

        .settings-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-right: 55px;
        }

        .settings-mini-btn {
            background: rgba(128, 128, 128, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 115px;
            height: 40px;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .settings-mini-btn i {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .settings-mini-btn:hover {
            background: var(--primary-color);
            color: #ffffff;
            border-color: transparent;
        }

        .settings-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background-color: var(--card-bg);
            border-left: 1px solid var(--border-color);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 30px;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
        }

        .settings-drawer.open {
            right: 0;
        }

        .settings-drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .settings-drawer-header h2 {
            color: var(--text-color);
            font-size: 1.8rem;
        }

        .close-drawer-btn {
            background: rgba(128, 128, 128, 0.1);
            border: none;
            color: var(--text-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-drawer-btn:hover {
            background: var(--primary-color);
            color: #ffffff;
        }

        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .drawer-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        main {
            margin-top: 100px;
            flex: 1;
            padding: 40px 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero {
            text-align: center;
            padding: 70px 30px;
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            background: var(--primary-color);
            color: #ffffff;
            border-color: transparent;
        }

        .influence-section {
            margin: 0 auto;
            max-width: 900px;
        }

        .influence-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .influence-header h2 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .influence-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .influence-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .inf-card {
            border-radius: 20px;
            padding: 35px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .inf-card h3 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 5px;
            line-height: 1;
            color: var(--text-color);
        }

        .inf-card h4 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 800;
            margin-bottom: 10px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-color);
        }

        .inf-card p {
            font-size: 1.05rem;
            color: var(--text-muted);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
        }

        .feature-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
